name: Bug report
description: File a bug report as an issue
title: '[BUG] <title>'
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for the bug you encountered.
      options:
        - label: I have searched the existing issues
          required: true
  - type: textarea
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        1. Click on '...'
        1. Scroll down to '...'
        1. See error '...'
    validations:
      required: false
  - type: textarea
    attributes:
      label: Environment (if applicable)
      description: |
        Provide details about your environment to help us reproduce the issue.

        **For all users:**
        - **OS**: The operating system you're using (e.g., Windows, macOS, Linux, iOS, Android)
        - **Browser**: The browser you're using (e.g., Chrome 124, Safari 17, Firefox 123)

        **For developers contributing to this project** (optional):
        - **Python version**: The Python version running the server (e.g., 3.12)
        - **Software versions**: The release, branch, or commit you're running (e.g., main, v0.1.0)
      value: |
        - **OS**:
        - **Browser**:
        - **Python version** (developers only):
        - **Software versions** (developers only):
      render: markdown
    validations:
      required: false
  - type: textarea
    attributes:
      label: Anything else?
      description: |
        Links? References? Please add anything that will give us more context about your problem.

        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
    validations:
      required: false
