{% extends "main/base.account.html" %}
{% load crispy_forms_tags %}
{% block content %}
    <section class="container">
        <p>
            <b>Please enter (and confirm) your new password.</b>
        </p>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <input type="submit" class="btn btn-primary" value="Change my password">
        </form>
    </section>
{% endblock content %}
