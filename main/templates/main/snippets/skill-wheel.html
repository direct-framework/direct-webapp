<script>
const radialBarChartConfig = {
    width: 900,
    height: 700,
    plotYOffset: 40,
    innerRadius: 140,
    outerPadding: 100,
    categoryPadding: 0.1,
    skillPadding: 0.01,
    arcPercent: 0.99,
    arcStartOffset: 0.01,
    annotationPadding: 20,
    maxLabelWidth: 180,
    lineThickness: 2,
    fontSize: 20,
    labelXOffset: 1.05,
    labelYSpacing: 40,
    lvlLabelType: "none",
    labelTextColor: "white",
    lvlTextColor: "var(--ar-primary)",
    lvlArcColor: "rgba(var(--ar-primary-rgb), 0.2)",
    colourList: [
        "#4E79A7", "#F28E2B", "#E15759", "#76B7B2", "#59A14F",
        "#EDC948", "#B07AA1", "#FF9DA7", "#9C755F", "#BAB0AC",
    ],
};

function renderRadialBarChart(target, data, levels) {
    target.innerHTML = '';
    main().RadialBarChart({
        target: target,
        data: data,
        levels: levels,
        config: radialBarChartConfig,
    });
}

document.addEventListener('DOMContentLoaded', function () {
    const skillLevels = {{ skill_levels|safe }};

    {% if mode == "skill-profile" %}
    const target = document.getElementById('{{ target_id }}');
    const data = {{ chart_data|safe }};
    renderRadialBarChart(target, data, skillLevels.filter(lvl => lvl.level > 0));

    {% elif mode == "roles" %}
    const sampleData = {{ sample_data|safe }};
    for (let i = 0; i < sampleData.length; i++) {
        const target = document.getElementById('dataviz_' + sampleData[i].user_id);
        renderRadialBarChart(target, sampleData[i].user_data, skillLevels);
    }

    {% elif mode == "hero" %}
    const datavizRoot = document.getElementById('{{ target_id }}');
    const sampleData = {{ sample_data|safe }};

    window.loadSkillWheel = function(profileId) {
        const profile = sampleData.find(u => u.user_id === profileId) || { user_data: [], role: 'Unknown Role' };
        renderRadialBarChart(datavizRoot, profile.user_data, skillLevels);
    };
    loadSkillWheel(1);
    {% endif %}
});
</script>
