<script>
const radialBarChartConfig = {
    width: 900,
    height: 700,
    plotYOffset: 40,
    innerRadius: 140,
    outerPadding: 100,
    categoryPadding: 0.1,
    skillPadding: 0.01,
    arcPercent: 0.99,
    arcStartOffset: 0.01,
    annotationPadding: 20,
    maxLabelWidth: 180,
    lineThickness: 2,
    fontSize: 20,
    labelXOffset: 1.05,
    labelYSpacing: 40,
    lvlLabelType: "none",
    labelTextColor: "white",
    lvlTextColor: "var(--ar-primary)",
    lvlArcColor: "rgba(var(--ar-primary-rgb), 0.2)",
    colourList: [
        "#4E79A7", "#F28E2B", "#E15759", "#76B7B2", "#59A14F",
        "#EDC948", "#B07AA1", "#FF9DA7", "#9C755F", "#BAB0AC",
    ],
};

function renderRadialBarChart(target, data, levels) {
    target.innerHTML = '';
    main().RadialBarChart({
        target: target,
        data: data,
        levels: levels,
        config: radialBarChartConfig,
    });
}

document.addEventListener('DOMContentLoaded', function () {
    const skillLevels = {{ skill_levels|safe }};
    const charts = {{ chart_data|safe }};

    for (let i = 0; i < charts.length; i++) {
        const target = document.getElementById('dataviz_' + charts[i].target_id);
        renderRadialBarChart(target, charts[i].user_data, skillLevels);
    }
});
</script>
